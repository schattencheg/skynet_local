name: skynet-local
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - opencv>=4.10
  - onnxruntime>=1.18
  - pyyaml>=6.0
  - pydantic>=2.7
  - sqlalchemy>=2.0
  - pip:
      - vosk>=0.3.45
      - sounddevice>=0.4.6
      - PySide6>=6.7
      - pyqtgraph>=0.13.7
      - deepface>=0.0.92
      - pytest>=8.2
      - pytest-cov>=5.0
      - ruff>=0.5
      - mypy>=1.10
      - -e .
