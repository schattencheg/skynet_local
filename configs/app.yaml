# ─────────────────────────────────────────────────────────────────────────────
# Skynet Local — main application configuration
# Each section maps 1-to-1 to a Pydantic model in config/settings.py.
# Add new parameters here AND add a matching field + comment in settings.py.
# ─────────────────────────────────────────────────────────────────────────────

app:
  name: "Skynet Local"          # Human-readable application name shown in the title bar
  environment: "desktop"        # Deployment context: "desktop" | "headless" | "embedded"

source:
  kind: "camera"                # Input source type: "camera" | "video" | "image"
  camera_index: 0               # OS camera index used when kind="camera" (0 = default webcam)
  video_path: ""                # Absolute or relative path to a video file (kind="video")
  image_path: ""                # Absolute or relative path to a still image (kind="image")

vision:
  # ── Detector ────────────────────────────────────────────────────────────────
  detector_backend: "opencv_onnx"
  # Face detector implementation: "opencv_onnx" | "mediapipe" | "mock"

  detector_model_path: "models/face/detectors/face_detection_yunet_2026may.onnx"
  # Path to the ONNX face-detector weights file

  detector_score_threshold: 0.65
  # Minimum detection confidence to keep a face box (0–1). Lower = more detections, more false positives

  detector_nms_threshold: 0.3
  # IoU threshold for Non-Maximum Suppression; lower removes more overlapping boxes

  detector_top_k: 5
  # Maximum number of faces kept before NMS; increase for crowded scenes

  # ── Recognizer ──────────────────────────────────────────────────────────────
  recognizer_backend: "sface"
  # Face-embedding backend: "sface" | "arcface" | "mock"

  # ── Attributes ──────────────────────────────────────────────────────────────
  attributes_backend: "none"
  # Attribute-analysis backend: "none" | "onnx"

  emotion_model_path: "models/face/attributes/emotion_ferplus_8.onnx"
  # Path to the ONNX emotion-classification model (FER+ or compatible)

  emotion_n_det: 3
  # Number of consecutive detections required before an emotion is accepted as stable

  emotion_n_cooldown: 10
  # Number of frames emotion result is held after the face disappears (prevents flicker)

  emotion_min_prob: 0.23        # Minimum softmax probability to report an emotion; tune down if emotions are missed

  # ── Pose ────────────────────────────────────────────────────────────────────
  pose_backend: "landmarks_pnp"
  # Head-pose estimation method: "landmarks_pnp" | "none"

  # ── Pipeline timing ─────────────────────────────────────────────────────────
  detection_interval: 1
  # Run full detector every N frames; 1 = every frame, 2 = every other frame (saves CPU)

  matching_threshold: 0.45
  # Cosine-similarity threshold for face-identity match (0–1). Higher = stricter matching

voice:
  stt_backend: "vosk"           # Speech-to-text engine: "vosk" | "whisper" | "none"
  speaker_backend: "onnx_speaker"
  # Speaker-identification backend: "onnx_speaker" | "none"
  tts_backend: "none"           # Text-to-speech engine: "pyttsx3" | "coqui" | "none"
  owner_only_commands: true     # When true, voice commands are processed only for the registered owner

gui:
  backend: "opencv"             # Rendering backend: "opencv" | "qt" | "mock"
  mode: "classic"               # Visual mode: "classic" | "terminator" | "minimal"
  red_tint_alpha: 0.18          # Opacity of the red Terminator overlay tint (0.0–1.0)
  side_panel_width: 320         # Width of the identity / info side panel in pixels

storage:
  sqlite_url: "sqlite:///data/embeddings/skynet_local.db"
  # SQLAlchemy-compatible URL for the face-embedding database

runtime:
  windows_safe: true
  # When true, disables features known to be unstable on Windows (e.g. multiprocessing start methods)
  enable_fallbacks: true
  # When true, missing optional backends fall back to no-ops instead of raising errors
